 apiVersion: chaos-mesh.org/v1alpha1
 kind: PodChaos
 metadata:
   name: mssql-primary-pod-kill
   namespace: chaos-mesh
 spec:
   action: pod-kill
   mode: one
   selector:
     namespaces:
       - demo
     labelSelectors:
       "app.kubernetes.io/instance": "sqlserver-ag-cluster"
       "kubedb.com/role": "primary"
   gracePeriod: 0
   duration: 5m
