apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: ms-primary-network-delay
  namespace: chaos-mesh
spec:
  action: delay
  mode: all
  selector:
    namespaces:
      - demo
    labelSelectors:
      "app.kubernetes.io/component": "database"
      "kubedb.com/role": "primary"
  target:
    mode: all
    selector:
      namespaces:
        - demo
      labelSelectors:
        "app.kubernetes.io/component": "database"
  delay:
    latency: 2000ms
    correlation: '100'
    jitter: 0ms
  direction: to
  duration: 2m
