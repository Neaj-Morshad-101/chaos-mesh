apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos
metadata:
  name: ms-replica-memory-stress
  namespace: chaos-mesh
spec:
  mode: all
  selector:
    namespaces:
      - demo
    labelSelectors:
      "app.kubernetes.io/component": "database"
      "kubedb.com/role": "secondary"
  stressors:
    memory:
      workers: 1
      size: "800MB"  # High memory usage but not OOM
  duration: "1m"
