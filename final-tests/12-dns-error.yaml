apiVersion: chaos-mesh.org/v1alpha1
kind: DNSChaos
metadata:
  name: pg-primary-dns-error
  namespace: chaos-mesh
spec:
  action: error
  mode: all
  selector:
    namespaces:
      - demo
    labelSelectors:
      "app.kubernetes.io/component": "database"
      "kubedb.com/role": "primary"
  duration: "2m"
