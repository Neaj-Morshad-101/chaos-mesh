apiVersion: chaos-mesh.org/v1alpha1
kind: TimeChaos
metadata:
  name: pg-primary-time-offset
  namespace: chaos-mesh
spec:
  mode: all
  selector:
    namespaces:
      - demo
    labelSelectors:
      "app.kubernetes.io/component": "database"
      "kubedb.com/role": "primary"
  timeOffset: "-2h"
  clockIds:
    - CLOCK_REALTIME
  duration: "2m"
