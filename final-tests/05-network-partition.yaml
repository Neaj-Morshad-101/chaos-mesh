apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: ms-primary-network-partition
  namespace: chaos-mesh
spec:
  action: partition
  mode: one
  selector:
    namespaces:
      - demo
    labelSelectors:
      "app.kubernetes.io/component": "database"
      "kubedb.com/role": "primary"
  target:
    mode: all
    selector:
      namespaces:
        - demo
      labelSelectors:
        "app.kubernetes.io/component": "database"
        "kubedb.com/role": "secondary"
  direction: both
  duration: "4m"
