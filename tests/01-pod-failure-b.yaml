apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: mssql-replica-pod-failure
  namespace: chaos-mesh
spec:
  action: pod-failure
  mode: one
  selector:
    namespaces:
      - demo
    labelSelectors:
      "app.kubernetes.io/instance": "sqlserver-ag-cluster"
      "kubedb.com/role": "secondary"
  duration: "5m"
