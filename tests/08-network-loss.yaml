apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: mssql-primary-packet-loss
  namespace: chaos-mesh
spec:
  action: loss
  mode: one
  selector:
    namespaces:
      - demo
    labelSelectors:
      "app.kubernetes.io/instance": "sqlserver-ag-cluster"
      "kubedb.com/role": "primary"
  target:
    mode: all
    selector:
      namespaces:
        - demo
      labelSelectors:
        "app.kubernetes.io/instance": "sqlserver-ag-cluster"
  loss:
    loss: "100"
    correlation: "100"
  duration: "3m"
  direction: both
